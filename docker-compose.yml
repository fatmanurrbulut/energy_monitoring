services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "${MQTT_TLS_PORT:-8883}:8883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto/config/passwd:/mosquitto/config/passwd
      - ./mosquitto/certs:/mosquitto/certs:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  simulator:
    build:
      context: ./simulator
    container_name: simulator
    restart: unless-stopped
    depends_on:
      - mosquitto
    environment:
      - BROKER_HOST=mosquitto
      - BROKER_PORT=${MQTT_BROKER_PORT:-8883}
      - DEVICE_ID=${DEVICE_ID:-device01}
      - TOPIC_TELEMETRY=energy/${DEVICE_ID:-device01}/telemetry
      - TOPIC_STATUS=energy/${DEVICE_ID:-device01}/status
      - PUBLISH_INTERVAL_SEC=${PUBLISH_INTERVAL_SEC:-2}
      - HEARTBEAT_INTERVAL_SEC=${HEARTBEAT_INTERVAL_SEC:-10}
      - ALERT_CURRENT_THRESHOLD=${ALERT_CURRENT_THRESHOLD:-15}
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - MQTT_USE_TLS=true
      - MQTT_TLS_CA_CERT=/certs/ca.crt
      - MQTT_TLS_INSECURE=false
    volumes:
      - ./mosquitto/certs:/certs:ro

  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_USERNAME}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUX_ORG}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUX_BUCKET}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUX_TOKEN}
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping", "--host", "http://localhost:8086"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  storage_bridge:
    build:
      context: ./storage_bridge
    container_name: storage_bridge
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_started
      influxdb:
        condition: service_healthy
    environment:
      - BROKER_HOST=mosquitto
      - BROKER_PORT=${MQTT_BROKER_PORT:-8883}
      - MQTT_TOPIC=energy/+/telemetry
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - MQTT_USE_TLS=true
      - MQTT_TLS_CA_CERT=/certs/ca.crt
      - MQTT_TLS_INSECURE=false
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=${INFLUX_ORG}
      - INFLUX_BUCKET=${INFLUX_BUCKET}
      - INFLUX_MEASUREMENT=energy_telemetry
    volumes:
      - ./mosquitto/certs:/certs:ro

  alarm_api:
    build:
      context: ./alarm_api
    container_name: alarm_api
    restart: unless-stopped
    init: true
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=${INFLUX_ORG}
      - INFLUX_BUCKET=${INFLUX_BUCKET}
      - DEVICE_ID=${DEVICE_ID:-device01}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 10s

  nodered:
    build:
      context: ./nodered
    container_name: nodered
    restart: unless-stopped
    ports:
      - "${NODERED_PORT:-1881}:1880"
    depends_on:
      - mosquitto
    environment:
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=${INFLUX_ORG}
      - INFLUX_BUCKET=${INFLUX_BUCKET}
      - DEVICE_ID=${DEVICE_ID:-device01}
      - NODE_RED_CREDENTIAL_SECRET=${NODE_RED_CREDENTIAL_SECRET}
      - NODERED_ADMIN_USERNAME=${NODERED_ADMIN_USERNAME:-admin}
      - NODERED_ADMIN_PASSWORD=${NODERED_ADMIN_PASSWORD:-change-me}
    volumes:
      - nodered_data:/data
      - ./dashboard:/data/custom_dashboard
      - ./mosquitto/certs:/certs:ro

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    restart: unless-stopped
    depends_on:
      alarm_api:
        condition: service_healthy
      nodered:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-1880}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/health"]
      interval: 20s
      timeout: 5s
      retries: 8
      start_period: 10s

volumes:
  mosquitto_data:
  mosquitto_log:
  influxdb_data:
  influxdb_config:
  nodered_data:
