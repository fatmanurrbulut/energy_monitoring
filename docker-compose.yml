services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "${MQTT_TLS_PORT:-8883}:8883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto/config/passwd:/mosquitto/config/passwd
      - ./mosquitto/certs:/mosquitto/certs:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  simulator:
    build:
      context: ./simulator
    container_name: simulator
    depends_on:
      - mosquitto
    environment:
      - BROKER_HOST=mosquitto
      - BROKER_PORT=${MQTT_BROKER_PORT:-8883}
      - DEVICE_ID=${DEVICE_ID:-device01}
      - TOPIC_TELEMETRY=energy/${DEVICE_ID:-device01}/telemetry
      - TOPIC_STATUS=energy/${DEVICE_ID:-device01}/status
      - PUBLISH_INTERVAL_SEC=${PUBLISH_INTERVAL_SEC:-2}
      - HEARTBEAT_INTERVAL_SEC=${HEARTBEAT_INTERVAL_SEC:-10}
      - ALERT_CURRENT_THRESHOLD=${ALERT_CURRENT_THRESHOLD:-15}
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - MQTT_USE_TLS=true
      - MQTT_TLS_CA_CERT=/certs/ca.crt
      - MQTT_TLS_INSECURE=false
    volumes:
      - ./mosquitto/certs:/certs:ro

  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_USERNAME}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUX_ORG}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUX_BUCKET}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUX_TOKEN}
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2

  storage_bridge:
    build:
      context: ./storage_bridge
    container_name: storage_bridge
    depends_on:
      - mosquitto
      - influxdb
    environment:
      - BROKER_HOST=mosquitto
      - BROKER_PORT=${MQTT_BROKER_PORT:-8883}
      - MQTT_TOPIC=energy/+/telemetry
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - MQTT_USE_TLS=true
      - MQTT_TLS_CA_CERT=/certs/ca.crt
      - MQTT_TLS_INSECURE=false
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=${INFLUX_ORG}
      - INFLUX_BUCKET=${INFLUX_BUCKET}
      - INFLUX_MEASUREMENT=energy_telemetry
    volumes:
      - ./mosquitto/certs:/certs:ro

  nodered:
    build:
      context: ./nodered
    container_name: nodered
    ports:
      - "1880:1880"
    depends_on:
      - mosquitto
    environment:
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=${INFLUX_ORG}
      - INFLUX_BUCKET=${INFLUX_BUCKET}
      - DEVICE_ID=${DEVICE_ID:-device01}
      - NODE_RED_CREDENTIAL_SECRET=${NODE_RED_CREDENTIAL_SECRET}
    volumes:
      - nodered_data:/data
      - ./dashboard:/data/project
      - ./mosquitto/certs:/certs:ro

volumes:
  mosquitto_data:
  mosquitto_log:
  influxdb_data:
  influxdb_config:
  nodered_data:
